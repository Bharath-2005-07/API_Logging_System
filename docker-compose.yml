version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: api-logger-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: apilogger
      MONGO_INITDB_ROOT_PASSWORD: secure_password
      MONGO_INITDB_DATABASE: api-logging-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-logger-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-logger-backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: development
      BACKEND_PORT: 5000
      MONGODB_URI: mongodb://apilogger:secure_password@mongodb:27017/api-logging-db
      ETHEREUM_RPC_URL: https://eth-sepolia.g.alchemy.com/v2/YOUR_KEY
      PRIVATE_KEY: ${PRIVATE_KEY}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      IPFS_HOST: ipfs.infura.io
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./contracts/keys:/app/keys:ro
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-logger-network

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: api-logger-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: http://backend:5000
      REACT_APP_CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      REACT_APP_NETWORK: sepolia
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - api-logger-network

  # Optional: Local IPFS Node
  ipfs:
    image: ipfs/kubo:latest
    container_name: api-logger-ipfs
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      IPFS_PROFILE: server
    networks:
      - api-logger-network

networks:
  api-logger-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  ipfs_data:
